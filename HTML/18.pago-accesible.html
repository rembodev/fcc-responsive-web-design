<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Checkout Page</title>
  </head>

  <body>
    <h1>Checkout</h1>

    <section>
      <h2>Your Cart</h2>

      <img
        src="https://cdn.freecodecamp.org/curriculum/labs/cube.jpg"
        alt="Demostracion de un Cubo Rubik"
      />
    </section>

    <section>
      <h2>Payment Information</h2>

      <form>
        <!--input name-->

        <label for="card-name"
          ><span aria-hidden="true">*</span>Nombre de la Tarjeta</label
        >

        <input type="text" id="card-name" name="card-name" required />

        <br />

        <label for="card-number"><span aria-hidden="true">*</span>Number</label>

        <input
          type="text"
          id="card-number"
          name="card-number"
          aria-describedby="card-number-help"
          required
        />

        <p id="card-number-help">Formato requerido: 123-123-123-123</p>
      </form>
    </section>
  </body>
</html>
